# InsForge — Backend-as-a-Service for AI coding agents
# Wraps the InsForge repo at ../insforge with Tela-specific defaults.
#
# Prerequisites: git clone https://github.com/insforge/insforge.git ../insforge
#
# Start with: docker compose -f docker-compose.insforge.yml up -d
# Dashboard:  http://localhost:7131
# API:        http://localhost:7130

services:
  postgres:
    image: ghcr.io/insforge/postgres:v15.13.2
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c app.encryption_key='${ENCRYPTION_KEY:-insforge-dev-key-change-in-production}'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
    volumes:
      - insforge-pgdata:/var/lib/postgresql/data
      - ../insforge/deploy/docker-init/db/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../insforge/deploy/docker-init/db/jwt.sql:/docker-entrypoint-initdb.d/02-jwt.sql
      - ../insforge/deploy/docker-init/db/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - insforge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-insforge}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-insforge-dev-key-change-in-production}
    ports:
      - "${POSTGREST_PORT:-5430}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - insforge-network

  insforge:
    build:
      context: ../insforge
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:7130}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-7130}:7130"
      - "${AUTH_PORT:-7131}:7131"
    environment:
      - PORT=7130
      - PROJECT_ROOT=/app
      - JWT_SECRET=${JWT_SECRET:-insforge-dev-key-change-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-insforge-dev-encryption-key}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@tela.dev}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-tela-admin-dev}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-insforge}
      - POSTGREST_BASE_URL=http://postgrest:3000
      - DENO_RUNTIME_URL=http://deno:7133
      - STORAGE_DIR=/insforge-storage
      - LOGS_DIR=/insforge-logs
    volumes:
      - insforge-storage:/insforge-storage
      - insforge-logs:/insforge-logs
    restart: unless-stopped
    networks:
      - insforge-network

  deno:
    image: denoland/deno:alpine-2.0.6
    working_dir: /app
    depends_on:
      - postgres
      - postgrest
    ports:
      - "${DENO_PORT:-7133}:7133"
    environment:
      - PORT=7133
      - DENO_ENV=production
      - DENO_DIR=/deno-dir
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGREST_BASE_URL=http://postgrest:3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-insforge-dev-encryption-key}
      - JWT_SECRET=${JWT_SECRET:-insforge-dev-key-change-in-production}
    volumes:
      - ../insforge/functions:/app/functions
      - insforge-deno-cache:/deno-dir
    command: >
      sh -c "
        deno cache functions/server.ts &&
        deno run --allow-net --allow-env --allow-read=./functions/worker-template.js functions/server.ts
      "
    restart: unless-stopped
    networks:
      - insforge-network

volumes:
  insforge-pgdata:
  insforge-storage:
  insforge-logs:
  insforge-deno-cache:

networks:
  insforge-network:
    driver: bridge
