services:
  agent:
    build: .
    env_file: .env
    volumes:
      - vault-data:/data/vault
      - ssh-keys:/root/.ssh:ro
      - agent-db:/data/db
      - transcripts:/data/transcripts
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      chromadb:
        condition: service_healthy
      tela-git:
        condition: service_started
    networks:
      - tela
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  chromadb:
    image: chromadb/chroma
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3

  tela-git:
    build: ./docker/git-server
    container_name: tela-git
    volumes:
      - tela_git_repos:/repos
    ports:
      - "${GIT_SERVER_PORT:-3500}:3500"
    restart: unless-stopped
    networks:
      - tela

networks:
  tela:
    driver: bridge

volumes:
  vault-data:
  ssh-keys:
  agent-db:
  transcripts:
  chroma-data:
  tela_git_repos:
